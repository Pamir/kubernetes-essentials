---
# ServiceAccount Example - Identity for Pods
# ServiceAccounts provide identity for pods to access the Kubernetes API
# They can be bound to RBAC rules to control permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-app-service-account
  namespace: production
  labels:
    app: web-application
    component: identity
  annotations:
    # Optional: Link to external identity provider (AWS IAM, GCP Service Account, etc.)
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/WebAppRole"
spec:
  # Disable automatic mounting of service account token for security
  # Set to false if the pod doesn't need to access the Kubernetes API
  automountServiceAccountToken: false

---
# ServiceAccount with Token Auto-Mount Enabled
# Use when pods need to access the Kubernetes API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-client-service-account
  namespace: production
  labels:
    app: api-client
spec:
  # Enable automatic mounting (default: true, but explicit for clarity)
  automountServiceAccountToken: true

---
# Secret for ServiceAccount Token (for K8s < 1.24 or manual management)
# In newer Kubernetes versions, tokens are automatically created as needed
# You may need this for long-lived tokens or external access
apiVersion: v1
kind: Secret
metadata:
  name: web-app-token
  namespace: production
  annotations:
    kubernetes.io/service-account.name: "web-app-service-account"
type: kubernetes.io/service-account-token

---
# Pod using ServiceAccount
# Shows how to specify a ServiceAccount for a pod
apiVersion: v1
kind: Pod
metadata:
  name: web-app-pod
  namespace: production
spec:
  # Specify the ServiceAccount to use
  serviceAccountName: web-app-service-account
  
  # Override the automountServiceAccountToken setting at pod level
  # This takes precedence over the ServiceAccount setting
  automountServiceAccountToken: false
  
  containers:
  - name: app
    image: nginx:1.25
    ports:
    - containerPort: 80
    
    # The service account token (if mounted) will be available at:
    # /var/run/secrets/kubernetes.io/serviceaccount/token
    # /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    # /var/run/secrets/kubernetes.io/serviceaccount/namespace