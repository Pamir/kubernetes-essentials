# LoadBalancer Service - Creates external load balancer (cloud provider)
# Automatically provisions external load balancer to route traffic to service
apiVersion: v1
kind: Service
metadata:
  labels:
    app: guestbook
    tier: frontend
  name: frontend
spec:
  ports:
  - port: 80  # Service port
    protocol: TCP
    targetPort: 80  # Port on the pod containers
  selector:  # Selects pods with these labels
    app: guestbook
    tier: frontend
  sessionAffinity: None  # No session stickiness
  type: LoadBalancer  # Creates external load balancer
